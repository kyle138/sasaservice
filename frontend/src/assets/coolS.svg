<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 180" width="100" height="180">
  <defs>
    <linearGradient id="upgrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="orange" stop-opacity="0" />
      <stop offset="50%" stop-color="orange" stop-opacity="1" />
      <stop offset="100%" stop-color="blue" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="downgrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="orange" stop-opacity="0" />
      <stop offset="50%" stop-color="orange" stop-opacity="1" />
      <stop offset="100%" stop-color="blue" stop-opacity="0" />
    </linearGradient>
    <mask id="path-mask">
      <path d="M 50 130 v -30 l -30 -30 v -30 l 30 -30 l 30 30 v 30 l -15 15" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" 
        stroke="#ffffff" 
      />
      <path d="M 50 40 v 30 l 30 30 v 30 l -30 30 l -30 -30 v -30 l 15 -15" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" 
        stroke="#ffffff" 
      />
    </mask>
  </defs>

  <path d="M 50 130 v -30 l -30 -30 v -30 l 30 -30 l 30 30 v 30 l -15 15" 
    stroke="blue" 
    fill="none"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path d="M 50 40 v 30 l 30 30 v 30 l -30 30 l -30 -30 v -30 l 15 -15" 
    stroke="blue" 
    fill="none"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <g mask="url(#path-mask)">
    <rect x="0" y="-180" width="100" height="300" fill="url(#upgrad)" >
      <animateTransform 
        attributeName="transform"
        type="translate"
        values="0,180; 0,-180; 0,180"
        dur="1.38s"
        repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0; 0.5; 1"
        keySplines="0.25 0.1 0.25 1; 0.25 0.1 0.25 1"
      />
    </rect>
  </g>

</svg>
